# Netlify configuration for qa-bot-core demo/test environment

[build]
  # Build command
  command = "npm ci && npm run build"
  # Output directory (Create React App default)
  publish = "build"
  # Node version
  environment = { NODE_VERSION = "18", REACT_APP_QA_ENDPOINT = "/api/v1/query", REACT_APP_API_KEY = "demo-key" }

# Proxy API calls to the ACCESS agent backend
# Netlify 200 redirects act as a reverse proxy (no CORS needed)
[[redirects]]
  from = "/api/*"
  to = "https://access-agent.elytra.net/api/:splat"
  status = 200
  force = true

# SPA redirect - handle client-side routing (must come AFTER proxy rules)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers for security and caching
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
